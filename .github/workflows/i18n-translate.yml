# Machine-fill missing locale strings whenever the base catalog changes.
#
# New user-facing copy lands in messages/en.json; the non-base locales
# (fa/ar/ru/zh) need `bunx @inlang/cli machine translate`, which requires a
# Google Cloud Translation API key that only exists as the repo secret
# INLANG_GOOGLE_TRANSLATE_API_KEY. Running it here (instead of at image build
# on the deploy host) keeps translations IN GIT: builds stay reproducible
# (CDN-blinding Phase 3f asserts byte-identical output), the native-review
# packets (`bun run i18n:review`) see the same strings members do, and a bad
# machine translation can be fixed by editing the committed catalog.
#
# Flow: push to v2 touches messages/en.json → this fills ONLY the missing
# messages in the other locales (inlang machine translate never overwrites an
# existing translation, so human-reviewed strings are safe) → commits the
# updated catalogs back to v2. The commit touches only the non-en catalogs, so
# the `paths: messages/en.json` filter cannot retrigger this workflow (no loop).
# The normal CI workflow then validates the bot commit like any other push.
#
# Deploy note: the beta host deploys whatever is pulled, so translations for
# copy pushed moments ago land on the NEXT pull — push, let this run (~1 min),
# then `git pull` on the host before `compose up`.
#
# `workflow_dispatch` exists for one-time backfills (e.g. after adding the
# secret, or when a translate run was skipped because the secret was missing).
name: i18n machine translate

on:
  push:
    branches: [v2]
    paths:
      - 'messages/en.json'
  workflow_dispatch:

# One run at a time; a queued run picks up the latest commit anyway.
concurrency:
  group: i18n-translate
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Push happens against the branch tip, not the triggering commit.
          ref: v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Check the API key secret is configured
        id: key
        env:
          INLANG_GOOGLE_TRANSLATE_API_KEY: ${{ secrets.INLANG_GOOGLE_TRANSLATE_API_KEY }}
        run: |
          if [ -z "$INLANG_GOOGLE_TRANSLATE_API_KEY" ]; then
            echo "::warning::INLANG_GOOGLE_TRANSLATE_API_KEY secret not set - skipping machine translation. New strings fall back to English until it is configured and this workflow is re-run (workflow_dispatch)."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.key.outputs.present == 'true'
        run: bun install --frozen-lockfile

      # Fill only the MISSING messages in fa/ar/ru/zh (existing translations are
      # never touched). No i18n:compile here - the compiled paraglide output is
      # a build artifact, regenerated by `bun run build` on every deploy.
      - if: steps.key.outputs.present == 'true'
        name: Machine translate missing messages
        env:
          INLANG_GOOGLE_TRANSLATE_API_KEY: ${{ secrets.INLANG_GOOGLE_TRANSLATE_API_KEY }}
        run: bunx @inlang/cli@3 machine translate --project ./project.inlang

      - if: steps.key.outputs.present == 'true'
        name: Commit filled catalogs (if any)
        run: |
          if git diff --quiet -- messages/; then
            echo "All locales already complete - nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add messages/
          git commit \
            -m 'chore(i18n): machine-fill missing locale strings' \
            -m 'Auto-generated by .github/workflows/i18n-translate.yml after a messages/en.json change. Fills only missing messages; existing (human-reviewed) translations are never overwritten.'
          # Tolerate a racing push to v2 since checkout.
          git pull --rebase origin v2
          git push origin v2
