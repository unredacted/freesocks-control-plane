name: CI
on:
  pull_request:
  push:
    branches: [main, v2]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile

      # Generate convex/_generated (gitignored) so the convex typecheck has its
      # API/dataModel types. `convex codegen` runs offline — it builds the types
      # from local function files; the backend-pull step is best-effort.
      - name: Convex codegen
        run: bunx convex codegen || true

      # Typecheck spans client + shared + convex + Svelte components.
      - run: bun run typecheck

      # convex-test suite (in-memory; no backend needed).
      - run: bun run test

      # Build the SPA (the only build artifact now — the backend is convex/).
      - run: bun run build
