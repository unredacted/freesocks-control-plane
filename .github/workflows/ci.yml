name: CI
on:
  pull_request:
  push:
    branches: [main, v2]

# Force JS actions onto Node 24 (Node 20 is deprecated; Node 24 is the runner
# default from 2026-06-16, after which this is a harmless no-op). Covers any
# action whose own version still bundles Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile

      # Note: convex/_generated is committed (it can't be regenerated in CI
      # without a Convex deployment, and Convex recommends committing it), so the
      # convex typecheck + the convex-test suite work here with no backend.

      # Typecheck spans client + shared + convex + Svelte components.
      - run: bun run typecheck

      # convex-test suite (in-memory; no backend needed).
      - run: bun run test

      # eslint + prettier --check (was the deploy workflow's extra gate before
      # deploy.yml was removed in favour of manual deploys).
      - run: bun run lint

      # Build the SPA (the only build artifact now; the backend is convex/).
      - run: bun run build

  # Reproducible build (CDN-blinding Phase 3f): build twice from a clean checkout
  # and assert byte-for-byte identical output. The printed dist-sha256 is the hash
  # we publish out of band and an independent rebuilder reproduces (see
  # docs/oob-verification.md).
  reproducible-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - run: bash scripts/verify-reproducible.sh | tee -a "$GITHUB_STEP_SUMMARY"

  # Validate the Caddyfile adapts + parses (catches the servers/trusted_proxies
  # block + the {$CADDY_TRUSTED_PROXIES} placeholder syntax). All active env
  # placeholders carry defaults, so no env is needed. Pinned to the SAME digest as
  # docker/web.Dockerfile so CI validates against the exact deployed Caddy — the
  # drift guard below enforces the match (they drifted once and CI validated a
  # different Caddy than deployed for weeks).
  caddyfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Guard against digest drift vs docker/web.Dockerfile
        run: |
          ci_digest="$(grep -oP 'caddy:2-alpine@sha256:\K[0-9a-f]{64}' .github/workflows/ci.yml | head -1)"
          web_digest="$(grep -oP 'caddy:2-alpine@sha256:\K[0-9a-f]{64}' docker/web.Dockerfile | head -1)"
          if [ -z "$ci_digest" ] || [ "$ci_digest" != "$web_digest" ]; then
            echo "::error::Caddy digest drift: ci.yml=$ci_digest web.Dockerfile=$web_digest"
            exit 1
          fi
      - name: Validate Caddyfile
        run: |
          docker run --rm -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648 \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
