name: Deploy
on:
  push:
    tags:
      - 'v*' # production
      - 'beta-*' # staging
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Pick the right environment based on tag prefix or manual input.
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target || (startsWith(github.ref, 'refs/tags/v') && 'production' || 'beta') }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Resolve deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
          else
            echo "env=beta" >> "$GITHUB_OUTPUT"
          fi

      - run: bun install --frozen-lockfile
      # Prod deploy is operated manually; wrangler.toml/.beta.toml and secrets must
      # be present on the runner. Generate Worker types before typecheck/build.
      - name: Generate worker types
        run: bun run types
      - run: bun run typecheck
      - run: bun run test
      - name: Build (${{ steps.target.outputs.env }})
        run: bun run build:${{ steps.target.outputs.env }}

      - name: Apply D1 migrations (${{ steps.target.outputs.env }})
        run: bunx wrangler d1 migrations apply DB --remote --config wrangler${{ steps.target.outputs.env == 'beta' && '.beta' || '' }}.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker (${{ steps.target.outputs.env }})
        run: bunx wrangler deploy --config wrangler${{ steps.target.outputs.env == 'beta' && '.beta' || '' }}.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
