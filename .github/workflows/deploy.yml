name: Deploy
on:
  push:
    tags:
      - 'v*' # production
  workflow_dispatch:

# Deploys the two halves of the stack to the self-hosted Convex deployment:
#   1. `convex deploy` — typechecks + pushes the convex/ functions (queries,
#      mutations, actions, http router, crons) to the backend.
#   2. `vite build` — builds the static SPA, which a reverse proxy serves while
#      routing /api -> the Convex HTTP-actions origin (see docs/convex-self-hosting.md).
#
# Required repo secrets:
#   CONVEX_SELF_HOSTED_URL        (e.g. https://convex.freesocks.org)
#   CONVEX_SELF_HOSTED_ADMIN_KEY  (from `selfhost:admin-key`)
#   VITE_CONVEX_SITE_URL          (the public HTTP-actions origin for /api)

# Force JS actions onto Node 24 (Node 20 deprecated; default from 2026-06-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile

      - name: Deploy Convex functions
        run: bunx convex deploy -y
        env:
          CONVEX_SELF_HOSTED_URL: ${{ secrets.CONVEX_SELF_HOSTED_URL }}
          CONVEX_SELF_HOSTED_ADMIN_KEY: ${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}

      - name: Build SPA
        run: bun run build
        env:
          VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL }}

      # Ship dist/ to wherever the reverse proxy serves the SPA from. This step
      # is deployment-specific (rsync / object storage / container image) — wire
      # it to your host. The build artifact is ./dist.
      - name: Upload SPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: spa-dist
          path: dist
