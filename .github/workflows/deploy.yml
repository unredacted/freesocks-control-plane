name: Deploy
on:
  push:
    tags:
      - 'v*' # production
  workflow_dispatch:

# Deploys the two halves of the stack to the self-hosted Convex deployment:
#   1. `convex deploy`: typechecks + pushes the convex/ functions (queries,
#      mutations, actions, http router, crons) to the backend.
#   2. `vite build`: builds the static SPA, which a reverse proxy serves while
#      routing /api -> the Convex HTTP-actions origin (see docs/convex-self-hosting.md).
#
# A4: `deploy` does NOT run until `checks` (typecheck + tests + lint) is green —
# no tag ships unverified. Rollback = re-tag the previous good commit (the deploy
# is idempotent) or `git revert` + tag; see docs/beta-deploy.md "Rollback".
#
# Required repo secrets:
#   CONVEX_SELF_HOSTED_URL        (e.g. https://convex.freesocks.org)
#   CONVEX_SELF_HOSTED_ADMIN_KEY  (from `selfhost:admin-key`)
#   VITE_CONVEX_SITE_URL          (the public HTTP-actions origin for /api)
# Optional (SPA publish over SSH; omit to fall back to the uploaded artifact):
#   SPA_DEPLOY_SSH_KEY, SPA_DEPLOY_HOST, SPA_DEPLOY_PATH

# Force JS actions onto Node 24 (Node 20 deprecated; default from 2026-06-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # A4: the gate. Tests + typecheck + lint must pass before anything deploys.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      # _generated is committed, so typecheck needs no live backend / codegen.
      - run: bun run typecheck
      - run: bun run test
      - run: bun run lint

  deploy:
    needs: checks
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile

      # Backend first: an old SPA against a new backend is safe as long as
      # contract changes stay additive (the skew policy; see docs/beta-deploy.md).
      - name: Deploy Convex functions
        run: bunx convex deploy -y
        env:
          CONVEX_SELF_HOSTED_URL: ${{ secrets.CONVEX_SELF_HOSTED_URL }}
          CONVEX_SELF_HOSTED_ADMIN_KEY: ${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}

      - name: Build SPA
        run: bun run build
        env:
          VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL }}

      # Publish the built SPA to the host that serves it. If the SSH secrets are
      # configured, rsync dist/ into place; otherwise fall back to the artifact
      # (e.g. for the in-stack docker path, where the web image rebuilds the SPA).
      - name: Publish SPA over SSH
        if: ${{ secrets.SPA_DEPLOY_SSH_KEY != '' && secrets.SPA_DEPLOY_HOST != '' }}
        run: |
          install -m 600 /dev/stdin "$HOME/spa_key" <<< "${{ secrets.SPA_DEPLOY_SSH_KEY }}"
          rsync -az --delete -e "ssh -i $HOME/spa_key -o StrictHostKeyChecking=accept-new" \
            dist/ "${{ secrets.SPA_DEPLOY_HOST }}:${{ secrets.SPA_DEPLOY_PATH }}/"
          rm -f "$HOME/spa_key"

      - name: Upload SPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: spa-dist
          path: dist
