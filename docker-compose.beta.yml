# Beta deployment: self-hosted Convex backend (internal) + Caddy serving the SPA
# and reverse-proxying the API. Standalone (not an overlay on docker-compose.yml,
# which is the dev stack). Run from the repo root on the beta host:
#
#   docker compose -f docker-compose.beta.yml --env-file .env.beta up -d --build
#
# Caddy reaches the backend's HTTP-actions port (:3211) over the compose network;
# it is NOT published. The deploy/sync API (:3210) + dashboard (:6791) bind to
# 127.0.0.1 only (on-host `convex deploy` + an SSH-tunnelled dashboard); never
# expose them publicly. Full runbook: docs/beta-deploy.md.
name: fcp-beta

# P2: cap container log growth (json-file default grows unbounded). Applied to
# every long-lived service below via `logging: *log`.
x-logging: &log
  driver: json-file
  options:
    max-size: '10m'
    max-file: '5'

services:
  backend:
    # Pinned to the digest tested in dev (immutable). Re-pin when you upgrade.
    image: ghcr.io/get-convex/convex-backend@sha256:edd7959f3464ed661f6663f646db205d5d61bda606c969b074dfb3c69ed71463
    restart: unless-stopped
    logging: *log
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - '127.0.0.1:${PORT:-3210}:3210'
    volumes:
      - data:/convex/data
    environment:
      - ACTIONS_USER_TIMEOUT_SECS=${ACTIONS_USER_TIMEOUT_SECS:-120}
      - APPLICATION_MAX_CONCURRENT_MUTATIONS=16
      - APPLICATION_MAX_CONCURRENT_NODE_ACTIONS=16
      - APPLICATION_MAX_CONCURRENT_QUERIES=16
      - APPLICATION_MAX_CONCURRENT_V8_ACTIONS=16
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN}
      - DISABLE_BEACON=${DISABLE_BEACON:-true}
      - DO_NOT_REQUIRE_SSL=true
      - INSTANCE_NAME=${INSTANCE_NAME}
      - INSTANCE_SECRET=${INSTANCE_SECRET}
      # Postgres connection string WITHOUT a db name or query params: Convex
      # derives the database from INSTANCE_NAME (hyphens -> underscores). SSL on
      # the link is disabled via DO_NOT_REQUIRE_SSL above (private compose net).
      - POSTGRES_URL=postgresql://convex:${POSTGRES_PASSWORD}@postgres:5432
      # Don't echo internal error detail to API clients in prod.
      - REDACT_LOGS_TO_CLIENT=${REDACT_LOGS_TO_CLIENT:-true}
      - RUST_LOG=${RUST_LOG:-info}
    healthcheck:
      test: curl -f http://localhost:3210/version
      interval: 10s
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  # Postgres 18: the production datastore (exercised on beta before prod). The
  # backend connects to a database named after INSTANCE_NAME with hyphens
  # replaced by underscores, so POSTGRES_DB below MUST match (keep them in sync).
  postgres:
    # Pinned by digest like every other image (re-pin on upgrade:
    # docker buildx imagetools inspect postgres:18).
    image: postgres:18@sha256:fd03421d521b789274856f57ba64914f8271255ef1415ac307cbc907121c8c7b
    restart: unless-stopped
    logging: *log
    stop_grace_period: 10s
    environment:
      - POSTGRES_USER=convex
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.beta}
      - POSTGRES_DB=freesocks_beta
    volumes:
      # PG18 moved the image VOLUME to /var/lib/postgresql (PGDATA defaults to
      # /var/lib/postgresql/18/docker inside it). Do NOT mount the pre-18
      # /var/lib/postgresql/data path or the container refuses to start.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U convex -d freesocks_beta']
      interval: 10s
      start_period: 20s
      retries: 5

  # A3: automated Postgres backups. pg_dumps on an interval and ships the dump to
  # S3-compatible object storage (set S3_* + AWS_* in .env.beta), pruning old
  # local copies. WARNING: without S3_* it keeps LOCAL-ONLY copies (no offsite) —
  # configure offsite before launch. Restore drill: docs/beta-deploy.md.
  backup:
    build:
      context: .
      dockerfile: docker/backup.Dockerfile
    restart: unless-stopped
    logging: *log
    stop_grace_period: 10s
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=convex
      - POSTGRES_DB=freesocks_beta
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.beta}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
      - BACKUP_RETENTION=${BACKUP_RETENTION:-7}
      - S3_ENDPOINT=${BACKUP_S3_ENDPOINT:-}
      - S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - S3_PREFIX=${BACKUP_S3_PREFIX:-db-backups}
      - AWS_ACCESS_KEY_ID=${BACKUP_AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${BACKUP_AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${BACKUP_AWS_REGION:-auto}
      # Explicit risk-acceptance opt-out: without BACKUP_S3_*, the sidecar
      # exits fatally unless this is 'true' (see docker/backup.sh).
      - BACKUP_ALLOW_LOCAL_ONLY=${BACKUP_ALLOW_LOCAL_ONLY:-}
    volumes:
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  # Admin-only Convex dashboard, bound to localhost (reach via SSH tunnel:
  # `ssh -L 6791:127.0.0.1:6791 -L 3210:127.0.0.1:3210 beta-host`).
  dashboard:
    image: ghcr.io/get-convex/convex-dashboard@sha256:bbc4d2c43d19fd6f2791dd6c5153a76e127f3eea489c1639e5acf66999c216bf
    restart: unless-stopped
    logging: *log
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - '127.0.0.1:${DASHBOARD_PORT:-6791}:6791'
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
    depends_on:
      backend:
        condition: service_healthy

  # Self-hosted Cap captcha (W1): the proof-of-work CAPTCHA that replaced
  # Cloudflare Turnstile. Caddy proxies the public /cap path here (widget
  # endpoints + the ADMIN_KEY-gated admin dashboard — the deployment fronts
  # this host with an authenticating edge, Pangolin + CrowdSec, that gates the
  # admin paths); the backend verifies tokens over the compose network
  # (CAP_API_ENDPOINT=http://cap:3000).
  cap:
    # Pinned by digest (re-pin on upgrade: docker buildx imagetools inspect tiago2/cap:latest).
    image: tiago2/cap:latest@sha256:97455d85b5517172397c7053837d377c72ded6250777928d5435c3eab2f58779
    restart: unless-stopped
    logging: *log
    stop_grace_period: 10s
    ports:
      # Fallback admin access with no edge/auth layer in the path (loopback
      # only; ssh -L 3000:127.0.0.1:3000 <host>). Useful if the fronting
      # proxy is down or misconfigured.
      - '127.0.0.1:${CAP_DASHBOARD_PORT:-3000}:3000'
    environment:
      - ADMIN_KEY=${CAP_ADMIN_KEY:?set CAP_ADMIN_KEY in .env.beta (>=32 chars)}
      - REDIS_URL=redis://valkey:6379
    healthcheck:
      # The image ships NO wget/curl (verified against the pinned digest) — a
      # wget-based check fails with exit 127 on every probe and marks a
      # perfectly healthy server unhealthy, which blocks `web` (depends_on)
      # forever. bun is the image's runtime; fetch resolves on ANY HTTP
      # response (server up) and throws on connection refused.
      test: ['CMD', 'bun', '-e', "await fetch('http://localhost:3000/')"]
      interval: 15s
      start_period: 15s
      retries: 5
    depends_on:
      valkey:
        condition: service_healthy

  # Cap's datastore (Redis-compatible). Persists issued challenges/tokens.
  valkey:
    # Pinned by digest (re-pin: docker buildx imagetools inspect valkey/valkey:8-alpine).
    image: valkey/valkey:8-alpine@sha256:77643d152547b446fc15cbafaff22004545663fcd40c6b28038ad283837baa75
    restart: unless-stopped
    logging: *log
    stop_grace_period: 10s
    command: ['valkey-server', '--save', '60', '1', '--appendonly', 'no']
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      start_period: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      # To enable app-layer encryption (CDN-blinding) later, pass the public pins
      # here as args (and set the private halves in the Convex deployment env),
      # then rebuild. Left unset = ships dark (plaintext dual-mode over TLS).
      # args:
      #   VITE_FS_MANIFEST_PK: "..."
      #   VITE_FS_MANIFEST_PK_PQ: "..."
      #   VITE_FS_SERVER_HPKE_KID: "..."
      #   VITE_FS_SERVER_HPKE_PK: "..."
    restart: unless-stopped
    logging: *log
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # persists the Let's Encrypt cert + account
      - caddy_config:/config
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-beta.freesocks.org}
      - ACME_EMAIL=${ACME_EMAIL:-}
    depends_on:
      backend:
        condition: service_healthy
      cap:
        condition: service_healthy

  # One-shot: derive a valid admin key from INSTANCE_NAME + INSTANCE_SECRET (a
  # standalone derivation via the backend image's generate_admin_key.sh, no
  # running server needed) and write it to the shared `convexkey` volume for the
  # deployer. The key is accepted by the backend because it shares INSTANCE_SECRET.
  keygen:
    image: ghcr.io/get-convex/convex-backend@sha256:edd7959f3464ed661f6663f646db205d5d61bda606c969b074dfb3c69ed71463
    restart: 'no'
    entrypoint: ['/bin/bash', '-c']
    command: ["./generate_admin_key.sh | grep '|' | tail -n1 > /keys/admin_key"]
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME}
      - INSTANCE_SECRET=${INSTANCE_SECRET:?set INSTANCE_SECRET in .env.beta}
    volumes:
      - convexkey:/keys

  # One-shot: push the Convex functions, apply the deployment env from
  # .env.convex, and seed (tiers + settings + the env-configured backend
  # instance). Runs after the backend is healthy and the admin key exists.
  # Idempotent, so it re-runs harmlessly on every `up`; exits 0 on success
  # (check `docker compose -f docker-compose.beta.yml logs deployer`).
  deployer:
    build:
      context: .
      dockerfile: docker/deploy.Dockerfile
    restart: 'no'
    environment:
      - CONVEX_SELF_HOSTED_URL=http://backend:3210
    volumes:
      - convexkey:/keys:ro
      # The application secrets to apply (copy .env.convex.example -> .env.convex).
      - ./.env.convex:/run/convex.env:ro
    depends_on:
      backend:
        condition: service_healthy
      keygen:
        condition: service_completed_successfully

volumes:
  data:
  pgdata:
  convexkey:
  caddy_data:
  caddy_config:
  valkey_data:
  backups:
