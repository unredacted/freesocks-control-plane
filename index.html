<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Never leak where a user came from / where they go. Reinforces the
         no-third-party posture and protects users whose traffic is inspected. -->
    <meta name="referrer" content="no-referrer" />
    <meta
      name="description"
      content="FreeSocks - free, open & uncensored proxies for users in heavily-censored regions"
    />
    <title>FreeSocks</title>

    <!--
      Per-request CSP script nonce. Caddy's templates module expands the
      http.request.uuid placeholder below to the SAME UUID it puts in the
      response's script-src nonce header, so this value matches the enforcing
      CSP. main.ts reads it into window.CAP_SCRIPT_NONCE so the Cap captcha's
      instrumentation challenge (a server-supplied inline script in a sandboxed
      iframe srcdoc) runs WITHOUT relaxing the strict no-inline CSP. Single-
      quoted so the inner quotes don't truncate the attribute.

      IMPORTANT: this whole file is run through Caddy templates, so it must
      contain NO other Go-template action sequences anywhere (comments
      included) — only the placeholder below. Served outside Caddy (vite dev /
      preview) the attribute stays the literal placeholder text; main.ts
      ignores that, and dev has no enforcing CSP anyway.
    -->
    <meta name="csp-nonce" content='{{placeholder "http.request.uuid"}}' />

    <!--
      FOUC-prevention script. Runs synchronously before paint, BEFORE the
      Vite bundle even starts parsing, so the user never sees a flash of
      the wrong theme. mode-watcher itself injects a similar script via
      <svelte:head> at runtime, but that fires too late in a pure SPA:
      the <html class="..."> needs to be correct on the first paint, not
      after the bundle mounts.

      Without this, `<html class="dark">` was hardcoded on the document and
      light-mode users saw a dark-mode flash on every load, making the
      light theme feel "broken" even though the toggle did update the class.

      Logic mirrors mode-watcher's `setInitialMode`:
        1. Read mode-watcher-mode from localStorage; default to 'dark'.
        2. Resolve 'system' against the OS preference.
        3. Add or remove the `dark` class on <html> accordingly.
        4. Set `color-scheme` so native form widgets and scrollbars match.

      Keep the storage key (`mode-watcher-mode`) and class name (`dark`) in
      sync with the mode-watcher config in App.svelte. If you change either
      there, change them here too.

      The logic lives in /public/theme-init.js (an external same-origin script,
      not inline) so a strict CSP `script-src 'self'` can be enforced in prod.
    -->
    <script src="/theme-init.js"></script>

    <!--
      Fonts (Inter for body, Inter Tight for display headings, JetBrains
      Mono for code) ship bundled with the SPA via @fontsource/* (see
      src/client/main.ts for the imports). We deliberately do NOT preconnect
      to fonts.googleapis.com or fonts.gstatic.com from this document. No
      third-party host should be contacted by the browser to render this
      page; everything is served from our own origin.
    -->
  </head>
  <body class="bg-background text-foreground">
    <div id="app"></div>
    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
