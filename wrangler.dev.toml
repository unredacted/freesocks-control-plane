#:schema node_modules/wrangler/config-schema.json
name = "freesocks-control-plane-local"
main = "src-entries/workers.ts"
compatibility_date = "2026-04-29"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Force every /api/* request through the worker BEFORE the asset binding
# checks for a matching file. Without this, Workers Static Assets with
# `not_found_handling = "single-page-application"` can intercept API paths
# (e.g. /api/auth/login) and serve the SPA shell, which then renders its
# client-side "Not found" page — looks like a routing bug but is actually
# the asset binding shadowing the Hono router. The worker itself still
# gates on `url.pathname.startsWith('/api/')` so non-API paths fall back
# to the asset binding as normal.
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "freesocks-local"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "src/server/db/migrations"

[[kv_namespaces]]
binding = "FS_SESSIONS_KV"
id = "local-sessions"

[[kv_namespaces]]
binding = "FS_CACHE_KV"
id = "local-cache"

[[kv_namespaces]]
binding = "FS_RATELIMIT_KV"
id = "local-ratelimit"

[[send_email]]
name = "SEND_EMAIL"
destination_address = "noreply@localhost"

[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "debug"

REMNAWAVE_BASE_URL = "http://localhost:3001"

AUTHENTIK_ISSUER = "http://localhost:9000/application/o/freesocks-dev/"
AUTHENTIK_CLIENT_ID = "freesocks-control-plane-dev"
AUTHENTIK_REDIRECT_URI = "http://localhost:5173/api/auth/callback"
AUTHENTIK_SCOPES = "openid email profile"

EMAIL_PROVIDER = "console"
EMAIL_FROM = "noreply@localhost"
EMAIL_REPLY_TO = "support@localhost"

FREE_TIER_TURNSTILE_SITE_KEY = "1x00000000000000000000AA"
FREE_TIER_DAILY_CAP = "1"
FREE_TIER_EXPIRY_DAYS = "90"

SUBSCRIPTION_DEFAULT_FORMAT = "auto"

S3_MIRRORS_ENABLED = "false"
S3_PROVIDER_COUNT = "0"

WEBAUTHN_RP_ID = "localhost"
WEBAUTHN_RP_NAME = "FreeSocks Admin (Dev)"
WEBAUTHN_ORIGIN = "http://localhost:5173"

MEMBERS_JOIN_URL = "http://localhost:8080/join"
MEMBERS_ACCOUNT_URL = "http://localhost:8080/account"

# Shared secret for /api/internal/cron/run-task. Optional on Workers (we have
# native cron triggers) — set it if you want ad-hoc HTTP-driven triggers for
# manual ops or local testing. Required on Fastly Compute, which has no
# native scheduler.
CRON_TRIGGER_SECRET = "dev-cron-trigger-secret"
